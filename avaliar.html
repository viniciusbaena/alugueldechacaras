<!DOCTYPE html>
<html lang="pt-BR">
<head>
<base href="/alugueldechacaras/">
<script>if(location.protocol==='http:')location.replace(location.href.replace('http:','https:'));</script>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://tathqoyhcuxthsrghrzx.supabase.co https://n8n.alugueldechacaras.com; frame-ancestors 'none';"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Deixe sua avaliação — AluguelDeChácaras.com</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ctext y=%22.9em%22 font-size=%2290%22%3E%F0%9F%8C%BF%3C/text%3E%3C/svg%3E" />
<meta name="robots" content="noindex" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700&family=Inter:wght@400;500;600&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --verde-escuro:#1e4d2b; --verde:#2d7a45; --verde-claro:#e8f5ed;
    --terra:#c8622a; --terra-claro:#fdf0e8; --creme:#faf8f3;
    --cinza:#6b7280; --cinza-borda:#e5e7eb; --preto:#111827; --branco:#fff;
    --vermelho:#b91c1c; --vermelho-claro:#fef2f2;
  }
  body{font-family:'Inter',sans-serif;background:var(--creme);color:var(--preto);line-height:1.6;}
  header{background:rgba(250,248,243,0.95);border-bottom:1px solid var(--cinza-borda);padding:16px 24px;}
  .logo{font-family:'Fraunces',serif;font-size:19px;color:var(--verde-escuro);text-decoration:none;}
  .logo span{color:var(--terra);}
  main{max-width:560px;margin:0 auto;padding:32px 20px 80px;}
  .card{background:var(--branco);border:1px solid var(--cinza-borda);border-radius:16px;padding:28px;box-shadow:0 4px 24px rgba(0,0,0,0.04);}
  h1{font-family:'Fraunces',serif;font-size:22px;color:var(--verde-escuro);margin-bottom:4px;}
  .subtitulo{color:var(--cinza);font-size:14px;margin-bottom:24px;}
  .estrelas{display:flex;gap:8px;justify-content:center;margin:20px 0;}
  .estrela{font-size:40px;cursor:pointer;color:#e5e7eb;transition:color .15s, transform .1s;user-select:none;}
  .estrela:hover{transform:scale(1.1);}
  .estrela.ativa{color:#f59e0b;}
  label{display:block;font-size:13px;font-weight:600;color:var(--preto);margin:16px 0 6px;}
  input[type=text], textarea{width:100%;border:1.5px solid var(--cinza-borda);border-radius:10px;padding:12px 14px;font-family:inherit;font-size:14px;color:var(--preto);}
  input[type=text]:focus, textarea:focus{outline:none;border-color:var(--verde);}
  textarea{resize:vertical;min-height:100px;}
  .btn-enviar{width:100%;margin-top:20px;background:var(--verde-escuro);color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;}
  .btn-enviar:hover{background:var(--verde);}
  .btn-enviar:disabled{opacity:0.5;cursor:default;}
  .loading,.erro{text-align:center;padding:60px 20px;color:var(--cinza);}
  .erro{color:var(--vermelho);}
  .sucesso{text-align:center;padding:20px 0;}
  .sucesso .emoji{font-size:48px;margin-bottom:12px;}
  .sucesso h2{font-family:'Fraunces',serif;color:var(--verde-escuro);font-size:20px;margin-bottom:8px;}
  .sucesso p{color:var(--cinza);font-size:14px;}
  .aviso-erro{background:var(--vermelho-claro);color:var(--vermelho);border-radius:10px;padding:14px;font-size:14px;margin-top:16px;}
  .alvo-info{display:flex;align-items:center;gap:12px;background:var(--verde-claro);border-radius:12px;padding:14px 16px;margin-bottom:8px;}
  .alvo-info .emoji{font-size:28px;}
  .alvo-info .nome{font-weight:700;color:var(--verde-escuro);font-size:15px;}
  .alvo-info .sub{font-size:12px;color:var(--cinza);}
  footer{text-align:center;padding:24px;font-size:13px;color:var(--cinza);}
  footer a{color:var(--verde);}
</style>
</head>
<body>
<header><a href="/" class="logo">🌿 Aluguel de <span>Chácaras</span></a></header>
<main>
  <div id="conteudo" class="card"><div class="loading">Carregando...</div></div>
</main>
<footer>© 2026 Aluguel de Chácaras. <a href="/">Voltar ao início</a></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const N8N = 'https://n8n.alugueldechacaras.com/webhook';
const SUPA_URL  = 'https://tathqoyhcuxthsrghrzx.supabase.co';
const SUPA_ANON = 'sb_publishable_fLpPGAodcCvJxPkQ223ABQ_ApJKDLRU';
const _supa = window.supabase.createClient(SUPA_URL, SUPA_ANON);

const params = new URLSearchParams(location.search);
const bookingId = params.get('booking_id');
const supplierSlug = params.get('fornecedor');

let alvo = null; // { tipo: 'property'|'supplier', id, nome, sub, emoji, client_name_sugerido }
let notaEscolhida = 0;

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function renderFormulario() {
  const el = document.getElementById('conteudo');
  el.innerHTML = `
    <h1>Como foi sua experiência?</h1>
    <div class="subtitulo">Sua opinião ajuda outras pessoas a decidir com confiança.</div>
    <div class="alvo-info">
      <div class="emoji">${alvo.emoji}</div>
      <div>
        <div class="nome">${escapeHtml(alvo.nome)}</div>
        <div class="sub">${escapeHtml(alvo.sub)}</div>
      </div>
    </div>
    <div class="estrelas" id="estrelas">
      ${[1,2,3,4,5].map(n => `<span class="estrela" data-n="${n}">★</span>`).join('')}
    </div>
    <label for="input-nome">Seu nome</label>
    <input type="text" id="input-nome" value="${escapeHtml(alvo.client_name_sugerido || '')}" placeholder="Como devemos te chamar?" />
    <label for="input-comentario">Comentário (opcional)</label>
    <textarea id="input-comentario" placeholder="Conte como foi sua experiência..."></textarea>
    <button class="btn-enviar" id="btn-enviar" disabled>Selecione uma nota para continuar</button>
    <div id="resultado-envio"></div>
  `;

  const estrelasEls = [...document.querySelectorAll('.estrela')];
  estrelasEls.forEach(e => {
    e.addEventListener('click', () => {
      notaEscolhida = parseInt(e.dataset.n, 10);
      estrelasEls.forEach(x => x.classList.toggle('ativa', parseInt(x.dataset.n, 10) <= notaEscolhida));
      const btn = document.getElementById('btn-enviar');
      btn.disabled = false;
      btn.textContent = 'Enviar avaliação';
    });
  });

  document.getElementById('btn-enviar').addEventListener('click', enviarAvaliacao);
}

async function enviarAvaliacao() {
  const btn = document.getElementById('btn-enviar');
  const resDiv = document.getElementById('resultado-envio');
  const nome = document.getElementById('input-nome').value.trim();
  const comentario = document.getElementById('input-comentario').value.trim();

  if (!nome) {
    resDiv.innerHTML = '<div class="aviso-erro">Por favor, informe seu nome.</div>';
    return;
  }
  if (!notaEscolhida) {
    resDiv.innerHTML = '<div class="aviso-erro">Selecione uma nota de 1 a 5 estrelas.</div>';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Enviando...';
  resDiv.innerHTML = '';

  const payload = {
    client_name: nome,
    rating: notaEscolhida,
    comment: comentario || null
  };
  if (alvo.tipo === 'property') {
    payload.booking_id = bookingId;
    payload.property_id = alvo.id;
  } else {
    payload.supplier_id = alvo.id;
  }

  const { error } = await _supa.from('reviews').insert(payload);

  if (error) {
    btn.disabled = false;
    btn.textContent = 'Enviar avaliação';
    if (error.code === '23505') {
      resDiv.innerHTML = '<div class="aviso-erro">Você já avaliou esta reserva. Obrigado pelo carinho! 💚</div>';
    } else {
      resDiv.innerHTML = '<div class="aviso-erro">Não foi possível enviar sua avaliação agora. Tente novamente em instantes.</div>';
    }
    return;
  }

  document.getElementById('conteudo').innerHTML = `
    <div class="sucesso">
      <div class="emoji">🌿</div>
      <h2>Obrigado pela sua avaliação!</h2>
      <p>Ela será publicada assim que for revisada pela nossa equipe.</p>
    </div>
  `;
}

function renderErro(msg) {
  document.getElementById('conteudo').innerHTML = `<div class="erro">${escapeHtml(msg)}</div>`;
}

async function carregarPorBooking() {
  try {
    const r = await fetch(`${N8N}/minha-reserva-dados?id=${encodeURIComponent(bookingId)}`);
    const data = await r.json();
    if (!data.found) {
      renderErro('Reserva não encontrada. Verifique o link recebido.');
      return;
    }
    if (data.status !== 'paid') {
      renderErro('Esta reserva não está disponível para avaliação.');
      return;
    }
    alvo = {
      tipo: 'property',
      id: null, // preenchido automaticamente pelo banco a partir do booking_id
      nome: data.property_name || 'Chácara',
      sub: data.city || '',
      emoji: '🌳',
      client_name_sugerido: data.client_name || ''
    };
    renderFormulario();
  } catch (e) {
    renderErro('Erro ao carregar sua reserva. Tente novamente em instantes.');
  }
}

async function carregarPorFornecedor() {
  try {
    const { data, error } = await _supa
      .from('suppliers')
      .select('id, name, category, avatar_emoji')
      .eq('slug', supplierSlug)
      .eq('active', true)
      .maybeSingle();
    if (error || !data) {
      renderErro('Fornecedor não encontrado.');
      return;
    }
    alvo = {
      tipo: 'supplier',
      id: data.id,
      nome: data.name,
      sub: 'Fornecedor de eventos',
      emoji: data.avatar_emoji || '✨',
      client_name_sugerido: ''
    };
    renderFormulario();
  } catch (e) {
    renderErro('Erro ao carregar o fornecedor. Tente novamente em instantes.');
  }
}

if (bookingId) {
  carregarPorBooking();
} else if (supplierSlug) {
  carregarPorFornecedor();
} else {
  renderErro('Link inválido — informe uma reserva ou fornecedor para avaliar.');
}
</script>
</body>
</html>
